    <title>Among Us IRL</title>
    <script>
      // Redirect to how-to-play if not on /play route
      (function() {
        var path = window.location.pathname;
        var params = new URLSearchParams(window.location.search);
        var hasRoomCode = params.get('room');
        var isPlayRoute = path === '/play' || path.startsWith('/play/');
        
        // If on root and not trying to join a game, redirect to instructions
        if (path === '/' && !hasRoomCode) {
          window.location.replace('/how-to-play.html');
        }
      })();
    </script>
